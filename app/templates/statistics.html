<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Brain Tumor MRI Classification</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
            margin: 0;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #764ba2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .chart-container h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Statistics Dashboard</h1>
            <div class="nav-buttons">
                <a href="/" class="btn">🏠 Home</a>
                <a href="/history" class="btn">📊 History</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Predictions</div>
                <div class="stat-value">{{ stats.total }}</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Average Confidence</div>
                <div class="stat-value">{{ stats.avg_confidence }}%</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">High Confidence (>80%)</div>
                <div class="stat-value">{{ stats.high_confidence_count }}</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Recent (24h)</div>
                <div class="stat-value">{{ stats.recent_count }}</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>Predictions by Class</h2>
            <div class="chart-wrapper">
                <canvas id="classChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const classData = {
            labels: [{% for class_name, count in stats.by_class.items() %}'{{ class_name }}'{% if not loop.last %}, {% endif %}{% endfor %}],
            datasets: [{
                label: 'Number of Predictions',
                data: [{% for class_name, count in stats.by_class.items() %}{{ count }}{% if not loop.last %}, {% endif %}{% endfor %}],
                backgroundColor: [
                    'rgba(102, 126, 234, 0.8)',
                    'rgba(118, 75, 162, 0.8)',
                    'rgba(255, 107, 107, 0.8)',
                    'rgba(81, 207, 102, 0.8)'
                ],
                borderColor: [
                    'rgba(102, 126, 234, 1)',
                    'rgba(118, 75, 162, 1)',
                    'rgba(255, 107, 107, 1)',
                    'rgba(81, 207, 102, 1)'
                ],
                borderWidth: 2
            }]
        };

        const ctx = document.getElementById('classChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: classData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                    },
                    title: {
                        display: false
                    }
                }
            }
        });
    </script>
</body>
</html>
